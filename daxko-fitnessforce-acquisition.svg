<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" width="1200" height="675">
  <!-- Dark navy background -->
  <rect width="1200" height="675" fill="#0d1421"/>

  <!-- Yellow accent bar top -->
  <rect x="0" y="0" width="1200" height="5" fill="#f0e87a"/>

  <!-- Left editorial column -->
  <rect x="64" y="64" width="3" height="547" fill="#f0e87a" opacity="0.3"/>

  <!-- Daxko diamond icon — 4 triangles forming a pinwheel X -->
  <!-- Centered at x=600, y=280, size ~160px -->
  <!-- Top triangle (orange) -->
  <polygon points="600,120 520,240 600,240" fill="#F7941D"/>
  <!-- Left triangle (magenta/pink) -->
  <polygon points="440,200 520,240 520,320" fill="#E91E8C"/>
  <!-- Right triangle (purple) -->
  <polygon points="760,200 680,240 680,320" fill="#7B2D8B"/>
  <!-- Bottom triangle (blue) -->
  <polygon points="600,400 520,320 600,320" fill="#1E88E5"/>
  <!-- Right-bottom connector -->
  <polygon points="600,400 680,320 600,320" fill="#1565C0"/>
  <!-- Center fill to complete the shape -->
  <polygon points="520,240 680,240 680,320 520,320" fill="#0d1421"/>

  <!-- Pinwheel redesign — cleaner version -->
  <!-- Actually let me redo this as the actual Daxko X shape -->
  <!-- The Daxko icon is 4 right triangles arranged as an X/pinwheel -->
  <!-- Top: orange pointing up -->
  <polygon points="600,108 532,210 668,210" fill="#F7A31C"/>
  <!-- Left: magenta pointing left -->
  <polygon points="492,210 594,278 492,346" fill="#D4227A"/>
  <!-- Right: purple pointing right -->
  <polygon points="708,210 606,278 708,346" fill="#6B2C91"/>
  <!-- Bottom: blue pointing down -->
  <polygon points="600,448 532,346 668,346" fill="#2B83C7"/>
  <!-- Center square -->
  <rect x="532" y="210" width="136" height="136" fill="#0d1421"/>

  <!-- "daxko" text -->
  <text x="600" y="510" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="300" fill="#9aa0b0" text-anchor="middle" letter-spacing="4">daxko</text>

  <!-- "fitnessforce" text -->
  <text x="600" y="560" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#d4d8e0" text-anchor="middle" letter-spacing="2">fitnessforce</text>

  <!-- Category pill -->
  <rect x="96" y="580" width="130" height="28" rx="2" fill="#f0e87a"/>
  <text x="161" y="599" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#0d1421" text-anchor="middle" letter-spacing="1.5">TECH &amp; AI</text>

  <!-- Date -->
  <text x="248" y="598" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.35)" letter-spacing="1">JUN 28, 2026</text>

  <!-- Subtle grid lines -->
  <line x1="0" y1="675" x2="1200" y2="675" stroke="#f0e87a" stroke-width="3"/>
</svg>
